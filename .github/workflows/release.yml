# Publishes via npm Trusted Publishing (OIDC) — no NPM_TOKEN needed.
# Each publishable package (@vesture/tokens, @vesture/react,
# @vesture/theme-retro) must have this repo + workflow file registered as a
# "Trusted Publisher" on npmjs.com first. See packages/*/README or the repo
# README for the exact steps.
name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Trusted Publishing (OIDC) requires npm CLI >=11.5.1 AND Node
      # >=22.14.0 (per npm's docs) — Node 20 silently falls through to no
      # auth (ENEEDAUTH) rather than erroring on the OIDC exchange itself.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The npm CLI bundled with actions/setup-node is often behind the
      # minimum version trusted publishing requires. Pinned to the v11 line
      # (not "latest"/v12+, which needs a newer Node than we're running).
      - name: Update npm
        run: npm install -g npm@11

      - name: Build
        run: npm run build

      - name: Create release pull request or publish
        uses: changesets/action@v1
        with:
          publish: npm run release
          version: npm run version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
