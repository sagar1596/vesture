# Publishes via npm Trusted Publishing (OIDC), with NPM_TOKEN kept as a
# fallback for bootstrapping brand-new packages. npm's OIDC token exchange
# looks up the Trusted Publisher config on the package's *existing* registry
# entry — a package that has never been published returns 404 "package not
# found" from the exchange endpoint, so the very first publish of a new
# package must go through a static token. npm always attempts OIDC first and
# only falls back to the static token if OIDC fails, so once a package has
# published successfully once, every later release uses OIDC automatically
# and NPM_TOKEN just sits unused for that package.
name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Trusted Publishing (OIDC) requires npm CLI >=11.5.1 AND Node
      # >=22.14.0 (per npm's docs) — Node 20 silently falls through to no
      # auth (ENEEDAUTH) rather than erroring on the OIDC exchange itself.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The npm CLI bundled with actions/setup-node is often behind the
      # minimum version trusted publishing requires. Pinned to the v11 line
      # (not "latest"/v12+, which needs a newer Node than we're running).
      - name: Update npm
        run: npm install -g npm@11

      - name: Build
        run: npm run build

      - name: Create release pull request or publish
        uses: changesets/action@v1
        with:
          publish: npm run release
          version: npm run version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
