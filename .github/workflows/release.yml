# Publishes via npm Trusted Publishing (OIDC) — no NPM_TOKEN needed.
# Each publishable package (@vesture/tokens, @vesture/react,
# @vesture/theme-retro) must have this repo + workflow file registered as a
# "Trusted Publisher" on npmjs.com first. See packages/*/README or the repo
# README for the exact steps.
name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Trusted Publishing (OIDC) requires a recent npm CLI; the version
      # bundled with actions/setup-node's Node 20 build is too old. Pinned to
      # the v11 line (not "latest"/v12+) since v12 requires Node >=22.
      - name: Update npm
        run: npm install -g npm@11

      - name: Build
        run: npm run build

      - name: Create release pull request or publish
        uses: changesets/action@v1
        with:
          publish: npm run release
          version: npm run version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
